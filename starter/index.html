<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ゲームの点数記録</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <h1>ゲームの点数記録</h1>
        <p>プレイ結果をあとで見返せるように、点数をメモするページです。</p>
      </header>

      <nav class="site-nav">
        <div class="nav-links">
          <a class="current" href="./index.html">登録</a>
          <a href="./records.html">スコア一覧</a>
        </div>
      </nav>

      <section class="panel">
        <h2>点数を登録しましょう</h2>
        <form class="score-form">
          <label>
            プレイヤー名
            <input type="text" name="player_name" placeholder="例: Alex" />
          </label>

          <label>
            点数
            <input type="number" name="score" placeholder="例: 12400" />
          </label>

          <label>
            プレイ日
            <input type="date" name="played_on" />
          </label>

          <label>
            メモ
            <textarea
              name="memo"
              rows="4"
              placeholder="プレイ内容のメモ"
            ></textarea>
          </label>

          <button type="button">登録する</button>
        </form>
      </section>
    </main>
  </body>
</html>
